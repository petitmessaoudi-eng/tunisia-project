<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المنشور - منصة الطلاب التونسيين</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#e0a3ff;--accent:#ff69b4;--accent2:#9370db;
  --cyan:#00e5ff;--green:#00ff87;
  --text:rgba(224,163,255,0.9);--text-muted:rgba(224,163,255,0.5);
  --glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.08);
  --radius:22px;--tr:all 0.4s cubic-bezier(0.4,0,0.2,1);
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0a0a}
::-webkit-scrollbar-thumb{background:linear-gradient(#e0a3ff,#ff69b4);border-radius:3px}
body{font-family:'Cairo',sans-serif;background:#000;color:var(--primary);overflow-x:hidden;min-height:100vh;-webkit-font-smoothing:antialiased}

/* BG */
.neural-bg{position:fixed;inset:0;z-index:-2;
  background:radial-gradient(circle at 15% 85%,rgba(75,0,130,.7) 0%,transparent 50%),
  radial-gradient(circle at 85% 15%,rgba(139,37,99,.8) 0%,transparent 50%),
  radial-gradient(circle at 45% 60%,rgba(128,0,128,.6) 0%,transparent 50%),
  radial-gradient(circle at 70% 40%,rgba(34,139,34,.4) 0%,transparent 50%),
  linear-gradient(135deg,#0a0a0a 0%,#2d1b3d 50%,#000 100%);
  animation:bgPulse 14s ease-in-out infinite}
@keyframes bgPulse{0%,100%{filter:brightness(.9) saturate(1.4) hue-rotate(0deg)}33%{filter:brightness(1.1) saturate(1.7) hue-rotate(15deg)}66%{filter:brightness(1) saturate(1.5) hue-rotate(-10deg)}}
.geo{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
.geo div{position:absolute;border:1px solid rgba(0,255,255,.3);animation:floatS 20s linear infinite}
.geo div:nth-child(1){width:100px;height:100px;right:10%;animation-delay:0s;border-color:rgba(255,105,180,.3)}
.geo div:nth-child(2){width:60px;height:60px;right:70%;animation-delay:-5s;border-radius:50%;border-color:rgba(147,112,219,.3)}
.geo div:nth-child(3){width:80px;height:80px;right:30%;animation-delay:-10s;transform:rotate(45deg);border-color:rgba(224,163,255,.3)}
.geo div:nth-child(4){width:120px;height:120px;right:50%;animation-delay:-15s;background:linear-gradient(45deg,rgba(255,105,180,.1),transparent)}
@keyframes floatS{from{transform:translateY(100vh) rotate(0deg);opacity:0}10%,90%{opacity:1}to{transform:translateY(-100px) rotate(360deg);opacity:0}}

/* HEADER */
header{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:1000;width:96%;max-width:1400px;
  padding:15px 30px;background:rgba(224,163,255,.08);backdrop-filter:blur(25px);
  border:1px solid rgba(224,163,255,.15);border-radius:25px;
  box-shadow:0 8px 32px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1);transition:var(--tr)}
header.scrolled{background:rgba(224,163,255,.12);box-shadow:0 12px 40px rgba(0,0,0,.5)}
nav{display:flex;justify-content:space-between;align-items:center;gap:20px}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;
  background:linear-gradient(45deg,#e0a3ff,#ff69b4);-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;text-decoration:none;white-space:nowrap}
.logo-icon{font-size:30px;filter:drop-shadow(0 0 8px #e0a3ff)}
.nav-links{display:flex;gap:8px;list-style:none}
.nav-links a{color:rgba(224,163,255,.8);text-decoration:none;padding:8px 16px;border-radius:12px;font-size:14px;font-weight:600;transition:var(--tr)}
.nav-links a:hover,.nav-links a.active{background:rgba(224,163,255,.15);color:#fff;box-shadow:0 0 15px rgba(224,163,255,.2)}
.nav-actions{display:flex;gap:10px;align-items:center}
.btn-nav{padding:9px 20px;border:none;border-radius:12px;font-weight:700;font-size:13px;
  font-family:'Cairo',sans-serif;cursor:pointer;transition:var(--tr);white-space:nowrap}
.btn-primary{background:linear-gradient(45deg,#e0a3ff,#ff69b4);color:#000;box-shadow:0 4px 15px rgba(224,163,255,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(224,163,255,.5)}
.btn-ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
.btn-ghost:hover{background:rgba(224,163,255,.1);border-color:rgba(224,163,255,.3);color:var(--primary)}

/* MAIN */
.main{padding-top:110px;min-height:100vh}

/* BREADCRUMB */
.breadcrumb{max-width:1100px;margin:0 auto;padding:20px 20px 0;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted)}
.breadcrumb a{color:var(--text-muted);text-decoration:none;transition:color .2s}
.breadcrumb a:hover{color:var(--primary)}
.breadcrumb .sep{opacity:.4}
.breadcrumb .current{color:var(--primary);font-weight:600}

/* LAYOUT */
.post-layout{max-width:1100px;margin:0 auto;padding:20px 20px 60px;display:grid;grid-template-columns:1fr 320px;gap:24px}

/* ── MAIN CARD ── */
.post-main{min-width:0}

.post-hero{
  background:var(--glass);backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);border-radius:var(--radius);
  overflow:hidden;margin-bottom:22px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  animation:cardIn .6s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.hero-cover{position:relative;height:320px;overflow:hidden;background:linear-gradient(135deg,rgba(75,0,130,.6),rgba(139,37,99,.6))}
.hero-cover img{width:100%;height:100%;object-fit:cover}
.hero-cover-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:90px}
.hero-cover-gradient{position:absolute;bottom:0;left:0;right:0;height:160px;background:linear-gradient(transparent,rgba(0,0,0,.85));pointer-events:none}
.hero-cover-title{position:absolute;bottom:24px;right:24px;left:24px}
.hero-cover-title h1{font-size:clamp(20px,3vw,32px);font-weight:900;color:#fff;line-height:1.3;margin-bottom:10px;
  text-shadow:0 2px 10px rgba(0,0,0,.5)}
.hero-badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{padding:5px 12px;border-radius:50px;font-size:11px;font-weight:700;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.15)}
.badge-type{background:rgba(0,0,0,.6);color:var(--primary)}
.badge-new{background:rgba(0,255,135,.2);color:#00ff87;border-color:rgba(0,255,135,.3)}
.badge-hot{background:rgba(255,68,68,.2);color:#ff6b6b;border-color:rgba(255,68,68,.3);animation:hotBlink 1.5s ease infinite}
.badge-pinned{background:rgba(255,215,0,.2);color:#ffd700;border-color:rgba(255,215,0,.3)}
@keyframes hotBlink{0%,100%{opacity:1}50%{opacity:.6}}

.post-hero-body{padding:28px}

/* META ROW */
.meta-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--glass-border)}
.meta-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);font-weight:600}
.meta-item .mi{font-size:15px}
.meta-item.highlight{color:var(--cyan)}
.meta-item.teacher{color:rgba(0,229,255,.8)}

/* STATS ROW */
.stats-row{display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.stat-box{flex:1;min-width:80px;background:rgba(255,255,255,.03);border:1px solid var(--glass-border);
  border-radius:14px;padding:14px;text-align:center;transition:var(--tr)}
.stat-box:hover{background:rgba(224,163,255,.06);border-color:rgba(224,163,255,.2);transform:translateY(-2px)}
.stat-box .sv{font-size:24px;font-weight:900;color:var(--primary);display:block;margin-bottom:4px}
.stat-box .sl{font-size:11px;color:var(--text-muted);font-weight:600}
.stat-box .si{font-size:18px;margin-bottom:6px;display:block}

/* DESCRIPTION */
.section-title{font-size:16px;font-weight:800;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--glass-border)}
.post-description{font-size:14px;color:rgba(255,255,255,.6);line-height:2;margin-bottom:24px;
  background:rgba(255,255,255,.02);border:1px solid var(--glass-border);border-radius:14px;padding:18px}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
.info-item{display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:rgba(255,255,255,.03);border:1px solid var(--glass-border);border-radius:14px;transition:var(--tr)}
.info-item:hover{background:rgba(224,163,255,.05);border-color:rgba(224,163,255,.15)}
.info-icon{font-size:22px;flex-shrink:0}
.info-label{font-size:11px;color:var(--text-muted);font-weight:600;display:block;margin-bottom:2px}
.info-value{font-size:13px;color:#fff;font-weight:700}

/* ACTION BUTTONS */
.action-bar{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.action-btn{flex:1;min-width:130px;padding:14px 20px;border:none;border-radius:14px;
  font-size:14px;font-weight:800;font-family:'Cairo',sans-serif;cursor:pointer;transition:var(--tr);
  display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
.action-download{background:linear-gradient(45deg,var(--accent2),var(--accent));color:#fff;box-shadow:0 6px 20px rgba(147,112,219,.4)}
.action-download:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(147,112,219,.6)}
.action-youtube{background:linear-gradient(45deg,#ff0000,#cc0000);color:#fff;box-shadow:0 6px 20px rgba(255,0,0,.3)}
.action-youtube:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(255,0,0,.5)}
.action-share{background:rgba(255,255,255,.06);border:1px solid var(--glass-border);color:rgba(255,255,255,.7)}
.action-share:hover{background:rgba(224,163,255,.1);border-color:rgba(224,163,255,.3);color:var(--primary)}
.action-browse{background:rgba(255,255,255,.06);border:1px solid var(--glass-border);color:rgba(255,255,255,.7)}
.action-browse:hover{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.3);color:var(--cyan)}
.action-disabled{background:rgba(255,255,255,.03);border:1px solid var(--glass-border);color:rgba(255,255,255,.25);cursor:not-allowed}

/* YOUTUBE EMBED */
.youtube-section{margin-bottom:24px}
.youtube-wrap{position:relative;padding-bottom:56.25%;height:0;border-radius:16px;overflow:hidden;
  border:1px solid var(--glass-border);box-shadow:0 8px 30px rgba(0,0,0,.5)}
.youtube-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}

/* IMAGE GALLERY */
.gallery-section{margin-bottom:24px}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.gallery-item{position:relative;aspect-ratio:1;border-radius:14px;overflow:hidden;cursor:pointer;
  border:1px solid var(--glass-border);transition:var(--tr)}
.gallery-item:hover{transform:scale(1.04);border-color:rgba(224,163,255,.4)}
.gallery-item img{width:100%;height:100%;object-fit:cover}
.gallery-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;
  justify-content:center;opacity:0;transition:opacity .3s;font-size:24px}
.gallery-item:hover .gallery-overlay{opacity:1}

/* DOWNLOAD SECTION */
.download-card{background:linear-gradient(135deg,rgba(147,112,219,.1),rgba(255,105,180,.1));
  border:1px solid rgba(147,112,219,.25);border-radius:16px;padding:20px;margin-bottom:24px;
  display:flex;align-items:center;gap:16px}
.download-icon{font-size:40px;flex-shrink:0}
.download-info{flex:1}
.download-info .df{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
.download-info .ds{font-size:12px;color:var(--text-muted)}
.download-action{padding:10px 20px;background:linear-gradient(45deg,var(--accent2),var(--accent));
  border:none;border-radius:12px;color:#fff;font-family:'Cairo',sans-serif;font-size:13px;
  font-weight:700;cursor:pointer;transition:var(--tr);white-space:nowrap}
.download-action:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(147,112,219,.5)}

/* PROGRESS BAR (download animation) */
.progress-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:8px;display:none}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;
  width:0%;transition:width .3s ease}

/* ── COMMENTS ── */
.comments-section{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:28px;margin-bottom:22px;animation:cardIn .6s .2s ease both}

.comments-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.comments-count-badge{background:linear-gradient(45deg,rgba(224,163,255,.15),rgba(255,105,180,.15));
  border:1px solid rgba(224,163,255,.25);border-radius:50px;padding:4px 14px;
  font-size:13px;font-weight:700;color:var(--primary)}

.comment-item{display:flex;gap:12px;padding:16px;background:rgba(255,255,255,.02);
  border:1px solid var(--glass-border);border-radius:16px;margin-bottom:12px;
  animation:cardIn .4s ease both;transition:var(--tr)}
.comment-item:hover{background:rgba(255,255,255,.04);border-color:rgba(224,163,255,.12)}
.comment-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;
  color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(147,112,219,.3);overflow:hidden}
.comment-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.comment-body{flex:1;min-width:0}
.comment-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px;flex-wrap:wrap}
.comment-author{font-size:13px;font-weight:800;color:var(--primary)}
.comment-time{font-size:11px;color:rgba(255,255,255,.25)}
.comment-text{font-size:13px;color:rgba(255,255,255,.65);line-height:1.7}
.comment-imgs{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.comment-imgs img{width:65px;height:65px;object-fit:cover;border-radius:10px;cursor:pointer;
  border:1px solid var(--glass-border);transition:transform .2s}
.comment-imgs img:hover{transform:scale(1.08)}

/* COMMENT FORM */
.comment-form{margin-top:20px;padding-top:20px;border-top:1px solid var(--glass-border)}
.comment-form-title{font-size:14px;font-weight:800;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.no-login-msg{padding:16px;background:rgba(255,105,180,.08);border:1px solid rgba(255,105,180,.2);
  border-radius:12px;font-size:13px;color:rgba(255,105,180,.85);text-align:center;font-weight:600}
.no-login-msg a{color:var(--accent);font-weight:800}
.comment-textarea{width:100%;padding:14px;background:rgba(255,255,255,.04);
  border:1px solid var(--glass-border);border-radius:14px;color:#fff;
  font-family:'Cairo',sans-serif;font-size:13px;resize:vertical;min-height:90px;
  outline:none;transition:var(--tr)}
.comment-textarea::placeholder{color:rgba(255,255,255,.25)}
.comment-textarea:focus{border-color:rgba(224,163,255,.4);box-shadow:0 0 20px rgba(224,163,255,.08)}
.comment-form-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:10px;flex-wrap:wrap}
.img-upload-label{display:flex;align-items:center;gap:6px;padding:9px 16px;
  background:rgba(255,255,255,.04);border:1px solid var(--glass-border);border-radius:10px;
  font-size:12px;font-weight:600;color:rgba(255,255,255,.6);cursor:pointer;transition:var(--tr)}
.img-upload-label:hover{background:rgba(224,163,255,.08);border-color:rgba(224,163,255,.2);color:var(--primary)}
.comment-submit-btn{padding:10px 24px;background:linear-gradient(45deg,var(--accent2),var(--accent));
  border:none;border-radius:12px;color:#fff;font-family:'Cairo',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:var(--tr);box-shadow:0 4px 15px rgba(147,112,219,.3)}
.comment-submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(147,112,219,.5)}
.img-preview-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.img-preview-item{position:relative;width:60px;height:60px}
.img-preview-item img{width:100%;height:100%;object-fit:cover;border-radius:8px;border:1px solid var(--glass-border)}
.img-preview-remove{position:absolute;top:-5px;left:-5px;width:18px;height:18px;background:#ff4444;
  border:none;border-radius:50%;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.empty-comments{text-align:center;padding:30px;color:var(--text-muted);font-size:13px}
.empty-comments .ec-icon{font-size:40px;display:block;margin-bottom:10px;animation:floatIcon 3s ease-in-out infinite}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ── SIDEBAR ── */
.post-sidebar{display:flex;flex-direction:column;gap:18px}

.sidebar-card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-border);
  border-radius:20px;padding:22px;animation:cardIn .6s ease both}
.sidebar-card:nth-child(2){animation-delay:.1s}
.sidebar-card:nth-child(3){animation-delay:.2s}
.sidebar-card:nth-child(4){animation-delay:.3s}
.sidebar-title{font-size:14px;font-weight:800;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* QUICK STATS in sidebar */
.quick-stat{display:flex;align-items:center;justify-content:space-between;padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.05)}
.quick-stat:last-child{border-bottom:none}
.qs-left{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,.55);font-weight:600}
.qs-icon{font-size:18px}
.qs-val{font-size:14px;font-weight:800;color:var(--primary)}

/* RELATED POSTS */
.related-item{display:flex;gap:10px;padding:10px;border-radius:12px;cursor:pointer;
  transition:var(--tr);text-decoration:none;border:1px solid transparent}
.related-item:hover{background:rgba(224,163,255,.06);border-color:rgba(224,163,255,.12);transform:translateX(-3px)}
.related-thumb{width:52px;height:52px;border-radius:10px;overflow:hidden;flex-shrink:0;
  background:linear-gradient(135deg,rgba(75,0,130,.5),rgba(139,37,99,.5));
  display:flex;align-items:center;justify-content:center;font-size:22px}
.related-thumb img{width:100%;height:100%;object-fit:cover}
.related-info{flex:1;min-width:0}
.related-title{font-size:12px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:4px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.related-meta{font-size:11px;color:var(--text-muted)}
.related-loading{text-align:center;padding:20px;color:var(--text-muted);font-size:13px}

/* AUTHOR CARD */
.author-big{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.author-big-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;
  box-shadow:0 6px 20px rgba(147,112,219,.35);flex-shrink:0;overflow:hidden}
.author-big-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.author-big-name{font-size:15px;font-weight:800;color:#fff}
.author-big-role{font-size:12px;color:var(--text-muted);margin-top:2px}
.author-stat{display:flex;gap:12px;flex-wrap:wrap}
.author-stat-item{background:rgba(255,255,255,.04);border:1px solid var(--glass-border);
  border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;color:rgba(255,255,255,.6);
  display:flex;align-items:center;gap:6px}
.author-stat-item .asv{color:var(--primary)}

/* XP BAR */
.xp-row{margin-top:14px}
.xp-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-bottom:6px;font-weight:600}
.xp-track{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:3px;transition:width .8s ease}

/* TAGS */
.tags-wrap{display:flex;flex-wrap:wrap;gap:7px}
.tag-item{padding:5px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:50px;font-size:11px;font-weight:700;color:rgba(255,255,255,.6);
  cursor:pointer;transition:var(--tr);text-decoration:none;display:inline-block}

// ── JWT HELPERS ──────────────────────────────
function getToken() { return localStorage.getItem('token'); }
function authHeader() {
  const t = getToken();
  return t ? { 'Authorization': `Bearer ${t}` } : {};
}
function authJsonHeader() {
  return { 'Content-Type': 'application/json', ...authHeader() };
}

// ═══════════════════════════════════════════

document.addEventListener('DOMContentLoaded', async () => {

  window.addEventListener('scroll', () => {
    document.getElementById('mainHeader').classList.toggle('scrolled', window.scrollY > 50);
    document.getElementById('scrollTopBtn').classList.toggle('visible', window.scrollY > 400);
  });

  if (!postId) { showNotFound(); return; }
  await loadPost(postId);
});

// ═══════════════════════════════════════════
// LOAD POST
// ═══════════════════════════════════════════
async function loadPost(id) {
  try {
    const res = await fetch(`/api/posts/${id}`);
    if (!res.ok) { showNotFound(); return; }
    const data = await res.json();
    currentPost = data.post;
    if (!currentPost) { showNotFound(); return; }

    document.title = `${currentPost.title} - منصة الطلاب التونسيين`;
    document.getElementById('breadcrumbTitle').textContent = currentPost.title || 'منشور';

    renderPost(currentPost);
    saveToHistory(currentPost);
    loadRelated(currentPost);

  } catch(e) {
    showNotFound();
  }
}

// ═══════════════════════════════════════════
// RENDER COMMENTS
// ═══════════════════════════════════════════
function renderComments(comments) {
  const list = document.getElementById('commentsList');
  const badge = document.getElementById('commentsCountBadge');
  if (badge) badge.textContent = `${comments.length} تعليق`;
  if (!list) return;

  if (comments.length === 0) {
    list.innerHTML = `<div class="empty-comments"><span class="ec-icon">💬</span>لا توجد تعليقات بعد. كن أول من يعلق!</div>`;
    return;
  }

  list.innerHTML = [...comments].reverse().map((c,i) => {
    const name    = c.userName && c.userName !== 'مجهول' ? c.userName : (c.userName || '؟');
    const initial = name.trim().charAt(0).toUpperCase() || '؟';
    const colors  = ['135deg,#9370db,#ff69b4','135deg,#4f7ef5,#00e5ff','135deg,#10b981,#34d399','135deg,#f59e0b,#ff6b6b','135deg,#a855f7,#ec4899'];
    const colorIdx = (name.charCodeAt(0) || 0) % colors.length;
    const avatarStyle = `background:linear-gradient(${colors[colorIdx]})`;

    // عرض صورة الحساب إن وُجدت، وإلا الحرف الأول
    const avatarContent = c.userAvatar
      ? `<img src="${esc(c.userAvatar)}" alt="${esc(name)}" onerror="this.parentElement.innerHTML='${initial}'">`
      : initial;

    const imgs = c.images && c.images.length > 0
      ? `<div class="comment-imgs">${c.images.map(img => `<img src="${esc(img)}" onclick="openLbSingle('${esc(img)}')" loading="lazy">`).join('')}</div>`
      : '';
    return `
    <div class="comment-item" style="animation-delay:${i*0.05}s">
      <a href="${c.userId ? `/user-profile.html?id=${esc(c.userId)}` : '#'}" style="text-decoration:none;flex-shrink:0">
        <div class="comment-avatar" style="${c.userAvatar ? '' : avatarStyle};cursor:pointer;transition:transform .2s,box-shadow .2s" onmouseover="this.style.transform='scale(1.1)';this.style.boxShadow='0 0 12px rgba(224,163,255,.4)'" onmouseout="this.style.transform='scale(1)';this.style.boxShadow='none'">${avatarContent}</div>
      </a>
      <div class="comment-body">
        <div class="comment-top">
          <span class="comment-author">${c.userId ? `<a href="/user-profile.html?id=${esc(c.userId)}" style="color:inherit;text-decoration:none;transition:opacity .2s" onmouseover="this.style.opacity='.65'" onmouseout="this.style.opacity='1'">${esc(name)}</a>` : esc(name)}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="comment-time">${fmtDate(c.timestamp)}</span>
            ${currentUser ? `<button class="comment-report-btn" onclick="openReportModal('comment','${currentPost.id}','${esc(c._id||c.id||'')}','${esc((c.text||'تعليق').substring(0,40).replace(/'/g,"\\'"))}')">🚩 إبلاغ</button>` : ''}
          </div>
        </div>
        ${c.text ? `<div class="comment-text">${esc(c.text)}</div>` : ''}
        ${imgs}
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// LOAD RELATED POSTS
// ═══════════════════════════════════════════
async function loadRelated(post) {
  try {
    const params = new URLSearchParams();
    params.set('status','approved');
    if (post.subject) params.set('subject', post.subject);
    const res = await fetch(`/api/posts?${params}`);
    const data = await res.json();
    const related = (data.posts||[]).filter(p => p.id !== post.id).slice(0,5);
    const container = document.getElementById('relatedPosts');
    if (!container) return;

    if (related.length === 0) {
      container.innerHTML = `<div class="related-loading" style="color:var(--text-muted)">لا توجد منشورات مشابهة</div>`;
      return;
    }

    container.innerHTML = related.map(p => {
      const thumb = p.imageUrls && p.imageUrls.length > 0 ? p.imageUrls[0] : null;
      return `
      <a href="/post.html?id=${p.id}" class="related-item">
        <div class="related-thumb">
          ${thumb ? `<img src="${esc(thumb)}" loading="lazy">` : getEmoji(p.type)}
        </div>
        <div class="related-info">
          <div class="related-title">${esc(p.title||'بدون عنوان')}</div>
          <div class="related-meta">👁️ ${p.views||0} · 💬 ${(p.comments||[]).length}</div>
        </div>
      </a>`;
    }).join('');
  } catch(e) {}
}

// DOWNLOAD
// ═══════════════════════════════════════════
async function doDownload() {
  if (!currentPost || !currentPost.fileUrl) { showToast('لا يوجد ملف للتنزيل','error'); return; }
  try {
    // Show progress animation
    const prog = document.getElementById('downloadProgress');
    const bar = document.getElementById('progressBar');
    if (prog) { prog.style.display='block'; bar.style.width='0%'; }

    const res = await fetch(`/api/posts/${currentPost.id}/download`, {method:'POST'});
    const data = await res.json();

    if (prog && bar) {
      let w = 0;
      const iv = setInterval(() => {
        w += 15;
        bar.style.width = Math.min(w,100) + '%';
        if (w >= 100) { clearInterval(iv); setTimeout(()=>{ prog.style.display='none'; },600); }
      }, 60);
    }

    if (data.success && data.fileUrl) {
      window.open(data.fileUrl,'_blank');
      currentPost.downloads = (currentPost.downloads||0)+1;
      const dlEl = document.getElementById('dlCount');
      const sdlEl = document.getElementById('sidebarDl');
      if (dlEl) dlEl.textContent = currentPost.downloads.toLocaleString('ar');
      if (sdlEl) sdlEl.textContent = currentPost.downloads.toLocaleString('ar');
      showToast('جاري التنزيل 📥','success');
    } else {
      showToast('خطأ في التنزيل','error');
    }
  } catch(e) { showToast('خطأ في الاتصال','error'); }
}

// ═══════════════════════════════════════════
// SHARE
// ═══════════════════════════════════════════
function doShare() {
  const url = window.location.href;
  const title = currentPost ? currentPost.title : 'منشور تعليمي';
  if (navigator.share) {
    navigator.share({title, url}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(url).then(()=>{ showToast('تم نسخ الرابط! 📋','success'); }).catch(()=>{ showToast('تعذّر النسخ','error'); });
  }
}

function copyLink() {
  const input = document.getElementById('copyLinkInput');
  if (!input) return;
  input.select();
  navigator.clipboard.writeText(input.value).then(()=>{ showToast('تم نسخ الرابط! 📋','success'); });
}

// ═══════════════════════════════════════════
// COMMENTS
// ═══════════════════════════════════════════
function handleImgs(input) {
  const files = Array.from(input.files);
  if (commentFiles.length + files.length > 5) { showToast('5 صور كحد أقصى','error'); return; }
  files.forEach(f => { if (f.type.startsWith('image/')) commentFiles.push(f); });
  renderImgPreview();
  input.value='';
}

function renderImgPreview() {
  const wrap = document.getElementById('imgPreviewWrap');
  if (!wrap) return;
  wrap.innerHTML = commentFiles.map((f,i) => {
    const url = URL.createObjectURL(f);
    return `<div class="img-preview-item"><img src="${url}"><button class="img-preview-remove" onclick="removeImg(${i})">✕</button></div>`;
  }).join('');
}

function removeImg(i) { commentFiles.splice(i,1); renderImgPreview(); }

async function submitComment() {
  if (!currentUser || !getToken()) { showToast('يجب تسجيل الدخول','error'); return; }
  const textEl = document.getElementById('commentText');
  const text = textEl ? textEl.value.trim() : '';
  if (!text && commentFiles.length===0) { showToast('اكتب تعليقاً أو أضف صورة','error'); return; }

  const btn = document.querySelector('.comment-submit-btn');
  if (btn) { btn.disabled=true; btn.textContent='جاري الإرسال...'; }

  try {
    const fd = new FormData();
    fd.append('text', text);
    fd.append('userName', currentUser.name || currentUser.username || 'مجهول');
    commentFiles.forEach(f => fd.append('images', f));

    const res = await fetch(`/api/posts/${currentPost.id}/comments`, {
      method: 'POST',
      headers: authHeader(),
      body: fd
    });

    if (res.status === 401 || res.status === 403) {
      showToast('انتهت جلستك، يرجى تسجيل الدخول مجدداً', 'error');
      setTimeout(() => window.location.href = '/login.html', 1500);
      return;
    }

    const data = await res.json();

    if (data.success) {
      if (!currentPost.comments) currentPost.comments=[];
      currentPost.comments.push(data.comment);
      renderComments(currentPost.comments);
      if (textEl) textEl.value='';
      commentFiles=[];
      renderImgPreview();
      showToast('تم إرسال تعليقك! 🎉 (+10 XP)','success');
    } else {
      showToast('خطأ في إرسال التعليق','error');
    }
  } catch(e) { showToast('خطأ في الاتصال','error'); }
  finally { if(btn){btn.disabled=false;btn.textContent='إرسال ✈️';} }
}

// ═══════════════════════════════════════════
// LIGHTBOX
// ═══════════════════════════════════════════
function openLb(i) {
  lbIndex = i;
  updateLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}

function openLbSingle(url) {
  lbImages = [url];
  openLb(0);
}

function closeLb() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
}

function lbClickOut(e) { if(e.target===document.getElementById('lightbox')) closeLb(); }

function lbNav(dir) {
  lbIndex+=dir;
  if(lbIndex<0) lbIndex=lbImages.length-1;
  if(lbIndex>=lbImages.length) lbIndex=0;
  updateLb();
}

function updateLb() {
  document.getElementById('lbImg').src = lbImages[lbIndex]||'';
  document.getElementById('lbCounter').textContent = `${lbIndex+1} / ${lbImages.length}`;
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if(!lb.classList.contains('open')) return;
  if(e.key==='Escape') closeLb();
  if(e.key==='ArrowLeft') lbNav(-1);
  if(e.key==='ArrowRight') lbNav(1);
});

// ── RATING HELPERS ──
function buildStarsDisplay(avg) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    if (avg >= i) html += '<span class="star-filled">★</span>';
    else if (avg >= i - 0.5) html += '<span class="star-half">★</span>';
    else html += '<span class="star-empty">★</span>';
  }
  return html;
}

async function submitRating() {
  if (!currentUser || !getToken()) { showToast('يجب تسجيل الدخول للتقييم', 'error'); return; }
  const selected = document.querySelector('input[name="userRating"]:checked');
  if (!selected) { showToast('اختر عدد النجوم أولاً', 'error'); return; }
  const btn = document.getElementById('rateBtn');
  btn.disabled = true;
  btn.textContent = 'جاري الإرسال...';
  try {
    const res = await fetch(`/api/posts/${currentPost.id}/rate`, {
      method: 'POST',
      headers: authJsonHeader(),
      body: JSON.stringify({ rating: parseInt(selected.value) })
    });

    if (res.status === 401 || res.status === 403) {
      showToast('انتهت جلستك، يرجى تسجيل الدخول مجدداً', 'error');
      setTimeout(() => window.location.href = '/login.html', 1500);
      return;
    }

    const data = await res.json();
    if (data.success) {
      currentPost.avgRating = data.avgRating;
      currentPost.ratingsCount = data.ratingsCount;
      document.getElementById('starsDisplay').innerHTML = buildStarsDisplay(data.avgRating);
      document.querySelector('.rating-avg-num').textContent = data.avgRating.toFixed(1);
      document.querySelector('.rating-count').textContent = `(${data.ratingsCount} تقييم)`;
      showToast('شكراً على تقييمك! ⭐', 'success');
      btn.textContent = 'تم التقييم ✅';
    } else {
      showToast('خطأ في التقييم', 'error');
      btn.disabled = false; btn.textContent = 'إرسال التقييم';
    }
  } catch(e) {
    showToast('خطأ في الاتصال', 'error');
    btn.disabled = false; btn.textContent = 'إرسال التقييم';
  }
}

// ── RECENTLY VIEWED HISTORY ──
function saveToHistory(post) {
  try {
    const MAX = 5;
    let history = JSON.parse(localStorage.getItem('platform_history') || '[]');
    // Remove if already in list
    history = history.filter(h => h.id !== post.id);
    // Prepend new entry
    history.unshift({
      id: post.id,
      title: post.title || 'منشور',
      type: post.type || '',
      emoji: ({'ملخص':'📝','امتحان':'📋','فيديو':'🎥','تمارين':'📐','كتاب':'📚','شرح':'✏️','حل':'✅'}[post.type] || '📄'),
      viewedAt: Date.now()
    });
    // Keep only last MAX entries
    localStorage.setItem('platform_history', JSON.stringify(history.slice(0, MAX)));
  } catch(e) {}
}

// ── FOCUS MODE ──
let isFocusMode = false;
function toggleFocusMode() {
  isFocusMode = !isFocusMode;
  document.body.classList.toggle('focus-mode', isFocusMode);
  const btn = document.getElementById('focusModeBtn');
  if (btn) {
    btn.classList.toggle('active', isFocusMode);
    btn.textContent = isFocusMode ? '↩️ خروج' : '🎯 تركيز';
  }
  if (isFocusMode) {
    showToast('وضع التركيز مفعّل 🎯 — اضغط Escape للخروج', 'success');
    document.body.style.overflow = '';
  }
}
// Allow Escape to exit focus mode
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && isFocusMode) toggleFocusMode();
});

// ── PDF PREVIEW ──
function isPdf(url) {
  if (!url) return false;
  return url.toLowerCase().includes('.pdf') || url.toLowerCase().endsWith('.pdf');
}

function togglePdfPreview() {
  const btn = document.getElementById('pdfToggleBtn');
  const wrap = document.getElementById('pdfFrameWrap');
  if (!btn || !wrap) return;
  const isOpen = wrap.classList.toggle('open');
  btn.classList.toggle('active', isOpen);
  btn.innerHTML = isOpen
    ? '<span>✕</span> إغلاق المعاينة'
    : '<span>👁️</span> عرض PDF مباشرة في المتصفح';
  if (isOpen) {
    // Smooth scroll to the preview
    setTimeout(() => wrap.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }
}
// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function getEmoji(type) {
  return {'ملخص':'📝','امتحان':'📋','فيديو':'🎥','تمارين':'📐','كتاب':'📚','شرح':'✏️','حل':'✅'}[type]||'📄';
}

function getYtId(url) {
  if(!url) return '';
  const m = url.match(/(?:youtu\.be\/|v=|embed\/)([^#&?]{11})/);
  return m ? m[1] : '';
}

function fmtDate(d) {
  if(!d) return '—';
  try {
    const diff = Math.floor((Date.now()-new Date(d).getTime())/1000);
    if(diff<60) return 'الآن';
    if(diff<3600) return `منذ ${Math.floor(diff/60)} دقيقة`;
    if(diff<86400) return `منذ ${Math.floor(diff/3600)} ساعة`;
    if(diff<604800) return `منذ ${Math.floor(diff/86400)} يوم`;
    return new Date(d).toLocaleDateString('ar-TN',{year:'numeric',month:'short',day:'numeric'});
  } catch(e){ return d; }
}

function fmtDateFull(d) {
  if(!d) return '—';
  try { return new Date(d).toLocaleDateString('ar-TN',{year:'numeric',month:'long',day:'numeric'}); }
  catch(e){ return d; }
}

function esc(s) {
  if(typeof s !== 'string') return String(s||'');
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.innerHTML = `${type==='success'?'✅':'❌'} ${msg}`;
  t.className = `toast ${type} show`;
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 3200);
}
let themeLink = document.createElement('link');
themeLink.rel = 'stylesheet';
themeLink.id = 'theme-stylesheet';
document.head.appendChild(themeLink);

const themes = {
    'default':    '',
    'ultra-dark': 'post-theme-ultra-dark.css',
    'light':      'post-theme-light.css'
};

let currentTheme = localStorage.getItem('selectedTheme') || 'default';

function applyTheme(themeName) {
    themeLink.href = themes[themeName] || '';
    currentTheme = themeName;
    localStorage.setItem('selectedTheme', themeName);
    updateThemeButtonText();
}

function switchTheme() {
    const order = ['default', 'ultra-dark', 'light'];
    applyTheme(order[(order.indexOf(currentTheme) + 1) % order.length]);
}

function updateThemeButtonText() {
    const btn = document.getElementById('theme-toggle-btn');
    if (!btn) return;
    btn.textContent = { 'default': '🎨 الثيم الافتراضي', 'ultra-dark': '⚫ الثيم الداكن', 'light': '☀️ الثيم الفاتح' }[currentTheme] || '🎨 الثيم';
}

applyTheme(currentTheme);

document.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('theme-toggle-btn');
    if (btn) btn.addEventListener('click', switchTheme);
});
// ═══════════════════════════════════════════
// REPORT SYSTEM
// ═══════════════════════════════════════════
let _reportTarget = null; // { targetType, postId, commentId, label }

function openReportModal(targetType, postId, commentId, label) {
  if (!currentUser) { showToast('يجب تسجيل الدخول للإبلاغ','error'); return; }
  _reportTarget = { targetType, postId, commentId: commentId || null, label };
  const info = document.getElementById('reportTargetInfo');
  if (info) {
    info.innerHTML = targetType === 'post'
      ? `📄 <strong>المنشور:</strong> ${esc(label)}`
      : `💬 <strong>التعليق:</strong> "${esc(label)}..."`;
  }
  const reason = document.getElementById('reportReason');
  if (reason) reason.value = '';
  document.getElementById('reportModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeReportModal(e) {
  if (e && e.target !== document.getElementById('reportModal')) return;
  document.getElementById('reportModal').classList.remove('open');
  document.body.style.overflow = '';
  _reportTarget = null;
}

async function submitReport() {
  if (!_reportTarget) return;
  if (!currentUser || !getToken()) { showToast('يجب تسجيل الدخول','error'); return; }
  const reason = document.getElementById('reportReason').value.trim();
  if (!reason) { showToast('يرجى كتابة سبب الإبلاغ','error'); return; }

  const btn = document.getElementById('reportSubmitBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'جاري الإرسال...'; }

  try {
    const res = await fetch('/api/reports', {
      method: 'POST',
      headers: authJsonHeader(),
      body: JSON.stringify({
        targetType: _reportTarget.targetType,
        postId:     _reportTarget.postId,
        commentId:  _reportTarget.commentId,
        reason
      })
    });
    const data = await res.json();
    if (data.success) {
      showToast('تم إرسال الإبلاغ بنجاح ✅','success');
      document.getElementById('reportModal').classList.remove('open');
      document.body.style.overflow = '';
      _reportTarget = null;
    } else {
      showToast(data.error || 'خطأ في إرسال الإبلاغ','error');
    }
  } catch(e) {
    showToast('خطأ في الاتصال','error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🚩 إرسال الإبلاغ'; }
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('reportModal')?.classList.contains('open')) {
    document.getElementById('reportModal').classList.remove('open');
    document.body.style.overflow = '';
    _reportTarget = null;
  }
});

// ── User Nav ────────────────────────────────────────────────
function renderUserNav() {
    const area = document.getElementById('userNavArea');
    if (!area) return;

    const raw = localStorage.getItem('user');

    if (!raw) {
        area.innerHTML = `
            <a href="/login.html" class="login-nav-btn">
                <span>🔑</span>
                <span>تسجيل الدخول</span>
            </a>
        `;
        return;
    }

    let user;
    try { user = JSON.parse(raw); } catch { localStorage.removeItem('user'); renderUserNav(); return; }

    const name = user.name || user.username || 'مستخدم';
    const role = user.role === 'admin' ? 'مسؤول النظام' : 'طالب';
    const firstLetter = name.trim().charAt(0).toUpperCase();
    const avatar = user.avatar || user.profileImage || user.photoURL || null;

    const avatarHtml = avatar
        ? `<img src="${avatar}" class="user-avatar-circle" alt="${name}"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
           <div class="user-avatar-default" style="display:none;">${firstLetter}</div>`
        : `<div class="user-avatar-default">${firstLetter}</div>`;

    area.innerHTML = `
        <div class="user-nav-wrapper" id="userNavWrapper">
            <div class="user-avatar-btn" id="userAvatarToggle" title="${name}">
                ${avatarHtml}
            </div>
            <div class="user-dropdown-menu">
                <div class="dropdown-user-info">
                    <div class="dropdown-user-name">${name}</div>
                    <div class="dropdown-user-role">${role}</div>
                </div>
                <a href="/profile.html" class="dropdown-item">
                    <span>👤</span>
                    <span>بيانات الحساب</span>
                </a>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item danger" onclick="logoutUser()">
                    <span>🚪</span>
                    <span>تسجيل الخروج</span>
                </button>
            </div>
        </div>
    `;

    const wrapper = document.getElementById('userNavWrapper');
    const toggle  = document.getElementById('userAvatarToggle');

    toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        wrapper.classList.toggle('open');
    });

    document.addEventListener('click', function(e) {
        if (wrapper && !wrapper.contains(e.target)) {
            wrapper.classList.remove('open');
        }
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && wrapper) wrapper.classList.remove('open');
    });
}

function logoutUser() {
    localStorage.removeItem('user');
    localStorage.removeItem('token');
    sessionStorage.clear();
    window.location.href = '/login.html';
}

// استدعِها عند تحميل الصفحة
renderUserNav();
</script>
