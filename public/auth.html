<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - منصة الطلاب التونسيين</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
--primary-color: #4169E1;
--background: #ffffff;
--surface: #f8f9fa;
--text-primary: #2c3e50;
--text-secondary: #6c757d;
--border: #dee2e6;
}
body.dark-mode {
--primary-color: #4169E1;
--background: #0a0a0a;
--surface: #1a1a1a;
--text-primary: #ffffff;
--text-secondary: #b0b0b0;
--border: #3a3a3a;
}
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background: var(--background);
color: var(--text-primary);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
transition: background 0.3s, color 0.3s;
}
body::before {
content: '';
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(65, 105, 225, 0.03) 2px, rgba(65, 105, 225, 0.03) 4px),
repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(65, 105, 225, 0.03) 2px, rgba(65, 105, 225, 0.03) 4px);
z-index: -2;
}
body.dark-mode::before {
background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 255, 255, 0.03) 2px, rgba(255, 255, 255, 0.03) 4px),
repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255, 255, 255, 0.03) 2px, rgba(255, 255, 255, 0.03) 4px),
linear-gradient(135deg, #0a0a0a 0%, #121212 25%, #1a1a1a 50%, #121212 75%, #0a0a0a 100%);
}
.theme-toggle {
position: fixed;
top: 20px;
left: 20px;
background: var(--surface);
border: 1px solid var(--border);
width: 50px;
height: 50px;
border-radius: 50%;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 24px;
transition: all 0.3s;
z-index: 100;
}
.theme-toggle:hover {
transform: rotate(180deg);
}
.auth-container {
width: 100%;
max-width: 450px;
padding: 20px;
}
.auth-card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 20px;
padding: 50px 40px;
box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
}
body.dark-mode .auth-card {
box-shadow: 0 10px 40px rgba(65, 105, 225, 0.1);
}
.logo {
text-align: center;
margin-bottom: 35px;
}
.logo-icon {
width: 80px;
height: 80px;
background: linear-gradient(135deg, var(--primary-color), #00a8ff);
border-radius: 20px;
display: flex;
align-items: center;
justify-content: center;
font-size: 40px;
color: white;
margin: 0 auto 15px;
}
.logo-text {
font-size: 28px;
font-weight: 800;
background: linear-gradient(135deg, var(--primary-color), #00a8ff);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}
.tabs {
display: flex;
gap: 10px;
margin-bottom: 30px;
background: var(--background);
padding: 5px;
border-radius: 12px;
}
.tab {
flex: 1;
padding: 12px;
border: none;
background: transparent;
color: var(--text-secondary);
font-weight: 600;
font-size: 16px;
border-radius: 8px;
cursor: pointer;
transition: all 0.3s;
}
.tab.active {
background: linear-gradient(135deg, var(--primary-color), #00a8ff);
color: white;
box-shadow: 0 2px 8px rgba(65, 105, 225, 0.3);
}
.form {
display: none;
}
.form.active {
display: block;
}
.form-group {
margin-bottom: 20px;
}
.form-label {
display: block;
font-weight: 600;
margin-bottom: 8px;
color: var(--text-secondary);
font-size: 14px;
}
.form-input {
width: 100%;
padding: 14px;
border: 1px solid var(--border);
border-radius: 10px;
background: var(--background);
color: var(--text-primary);
font-size: 15px;
transition: all 0.3s;
}
.form-input:focus {
outline: none;
border-color: var(--primary-color);
box-shadow: 0 0 0 3px rgba(65, 105, 225, 0.1);
}
.submit-btn {
width: 100%;
padding: 16px;
background: linear-gradient(135deg, var(--primary-color), #00a8ff);
color: white;
border: none;
border-radius: 10px;
font-size: 18px;
font-weight: 700;
cursor: pointer;
transition: all 0.3s;
box-shadow: 0 4px 15px rgba(65, 105, 225, 0.3);
}
.submit-btn:hover {
transform: translateY(-2px);
box-shadow: 0 6px 20px rgba(65, 105, 225, 0.4);
}
.submit-btn:disabled {
opacity: 0.5;
cursor: not-allowed;
transform: none;
}
.demo-info {
background: linear-gradient(135deg, rgba(65, 105, 225, 0.1), rgba(0, 168, 255, 0.05));
border: 1px solid var(--primary-color);
border-radius: 12px;
padding: 15px;
margin-top: 25px;
text-align: center;
}
.demo-title {
font-weight: 700;
margin-bottom: 8px;
font-size: 14px;
}
.demo-credentials {
font-size: 13px;
color: var(--text-secondary);
}
@media (max-width: 768px) {
.auth-card {
padding: 35px 25px;
}
}
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle">🌙</button>

<div class="auth-container">
<div class="auth-card">
<div class="logo">
<div class="logo-icon">📚</div>
<div class="logo-text">منصة الطلاب</div>
</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('login')">تسجيل الدخول</button>
<button class="tab" onclick="switchTab('register')">إنشاء حساب</button>
</div>

<form class="form active" id="loginForm">
<div class="form-group">
<label class="form-label">البريد الإلكتروني</label>
<input type="email" class="form-input" id="loginEmail" placeholder="example@email.com" required>
</div>
<div class="form-group">
<label class="form-label">كلمة المرور</label>
<input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
</div>
<button type="submit" class="submit-btn">دخول</button>

<div class="demo-info">
<div class="demo-title">🔑 حساب تجريبي</div>
<div class="demo-credentials">admin@gmail.com / admin123</div>
</div>
</form>

<form class="form" id="registerForm">
<div class="form-group">
<label class="form-label">الاسم الكامل</label>
<input type="text" class="form-input" id="registerName" placeholder="أحمد محمد" required>
</div>
<div class="form-group">
<label class="form-label">البريد الإلكتروني</label>
<input type="email" class="form-input" id="registerEmail" placeholder="example@email.com" required>
</div>
<div class="form-group">
<label class="form-label">كلمة المرور</label>
<input type="password" class="form-input" id="registerPassword" placeholder="••••••••" required>
</div>
<button type="submit" class="submit-btn">إنشاء حساب</button>
</form>
</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
initializeTheme();
document.getElementById('loginForm').addEventListener('submit', handleLogin);
document.getElementById('registerForm').addEventListener('submit', handleRegister);
});

function switchTab(tab) {
const tabs = document.querySelectorAll('.tab');
const forms = document.querySelectorAll('.form');

tabs.forEach(t => t.classList.remove('active'));
forms.forEach(f => f.classList.remove('active'));

if (tab === 'login') {
tabs[0].classList.add('active');
forms[0].classList.add('active');
} else {
tabs[1].classList.add('active');
forms[1].classList.add('active');
}
}

async function handleLogin(e) {
e.preventDefault();

const email = document.getElementById('loginEmail').value;
const password = document.getElementById('loginPassword').value;

try {
const response = await fetch('/api/login', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ email, password })
});

const data = await response.json();
if (data.success) {
localStorage.setItem('user', JSON.stringify(data.user));
if (data.user.role === 'admin') {
window.location.href = '/admin.html';
} else {
window.location.href = '/';
}
} else {
alert(data.error);
}
} catch (error) {
console.error('Login error:', error);
alert('حدث خطأ في تسجيل الدخول');
}
}

async function handleRegister(e) {
e.preventDefault();

const name = document.getElementById('registerName').value;
const email = document.getElementById('registerEmail').value;
const password = document.getElementById('registerPassword').value;

try {
const response = await fetch('/api/register', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ name, email, password })
});

const data = await response.json();
if (data.success) {
localStorage.setItem('user', JSON.stringify(data.user));
window.location.href = '/';
} else {
alert(data.error);
}
} catch (error) {
console.error('Register error:', error);
alert('حدث خطأ في التسجيل');
}
}

function initializeTheme() {
const theme = localStorage.getItem('theme') || 'light';
if (theme === 'dark') {
document.body.classList.add('dark-mode');
document.getElementById('themeToggle').textContent = '☀️';
}

document.getElementById('themeToggle').addEventListener('click', () => {
document.body.classList.toggle('dark-mode');
const isDark = document.body.classList.contains('dark-mode');
localStorage.setItem('theme', isDark ? 'dark' : 'light');
document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
});
}
</script>
</body>
</html>
